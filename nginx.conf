server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation. Harmless for single-threaded builds; required if you
    # ever flip variant/thread_support to true in export_presets.cfg.
    add_header Cross-Origin-Opener-Policy   "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp"  always;

    # Serve WebAssembly with the correct MIME type
    location ~ \.wasm$ {
        default_type application/wasm;
    }

    # Compress the large JS/WASM/PCK payloads
    gzip on;
    gzip_types application/javascript application/wasm application/octet-stream text/html;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
